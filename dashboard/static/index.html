<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asterisk AI Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #log-terminal { height: 400px; overflow-y: auto; background: #1e1e1e; color: #00ff00; font-family: monospace; padding: 10px; border-radius: 5px; }
        .memory-editor { height: 400px; width: 100%; font-family: monospace; background: #2b2b2b; color: #fff; border: 1px solid #444; padding: 10px;}
        .nav-tabs .nav-link { cursor: pointer; }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h2>🤖 Asterisk AI Swarm Dashboard</h2>
        
        <ul class="nav nav-tabs mt-4" id="dashTabs">
            <li class="nav-item"><a class="nav-link active" onclick="switchTab('live')">Live View</a></li>
            <li class="nav-item"><a class="nav-link" onclick="switchTab('calls')">Call History</a></li>
            <li class="nav-item"><a class="nav-link" onclick="switchTab('missions')">Missions</a></li>
            <li class="nav-item"><a class="nav-link" onclick="switchTab('memory')">Memory</a></li>
        </ul>

        <div id="tab-live" class="tab-content mt-4">
            <div class="card mb-3">
                <div class="card-body">
                    <h4>Status: <span id="line-status" class="badge bg-secondary">Checking...</span></h4>
                    <div id="active-call-info" class="mt-2 text-info"></div>
                </div>
            </div>
            <h5>Live System Logs</h5>
            <div id="log-terminal"></div>
        </div>

        <div id="tab-calls" class="tab-content mt-4" style="display:none;">
            <input type="text" id="callSearch" class="form-control mb-3" placeholder="Filter calls..." onkeyup="loadCalls()">
            <div id="calls-list" class="list-group"></div>
        </div>

        <div id="tab-missions" class="tab-content mt-4" style="display:none;">
            <table class="table table-striped">
                <thead><tr><th>UTC</th><th>Status</th><th>Directive / Report</th><th>Action</th></tr></thead>
                <tbody id="missions-table"></tbody>
            </table>
        </div>

        <div id="tab-memory" class="tab-content mt-4" style="display:none;">
            <div class="row mb-3">
                <div class="col-md-3">
                    <select class="form-select" id="memType" onchange="loadMemoryList()">
                        <option value="users">Users</option>
                        <option value="endpoints">Endpoints</option>
                    </select>
                </div>
                <div class="col-md-9">
                    <select class="form-select" id="memFile" onchange="loadMemoryFile()"></select>
                </div>
            </div>
            <textarea id="memEditor" class="memory-editor mb-3"></textarea>
            <button class="btn btn-primary" onclick="saveMemory()">Save Memory</button>
            <span id="memSaveStatus" class="ms-2 text-success" style="display:none;">Saved!</span>
        </div>
    </div>

    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tabId).style.display = 'block';
            event.target.classList.add('active');
            
            if(tabId === 'calls') loadCalls();
            if(tabId === 'missions') loadMissions();
            if(tabId === 'memory' && document.getElementById('memFile').options.length === 0) loadMemoryList();
        }

        // Live View Logic
        setInterval(async () => {
            const res = await fetch('/api/status');
            const data = await res.json();
            const badge = document.getElementById('line-status');
            
            if (data.line_active) {
                badge.className = "badge bg-danger";
                badge.innerText = "Line Active (Locked)";
                if (data.call_info) {
                    document.getElementById('active-call-info').innerText = 
                        `Current Call: ${data.call_info.caller_name} (${data.call_info.caller_number})`;
                } else {
                    document.getElementById('active-call-info').innerText = "AI is executing a background task.";
                }
            } else {
                badge.className = "badge bg-success";
                badge.innerText = "Line Free (Idle)";
                document.getElementById('active-call-info').innerText = "";
            }
        }, 1000);

        const ws = new WebSocket(`ws://${window.location.host}/api/logs/ws`);
        const terminal = document.getElementById('log-terminal');
        ws.onmessage = (event) => {
            terminal.innerHTML += `<div>${event.data}</div>`;
            terminal.scrollTop = terminal.scrollHeight;
        };

        // Past Calls Logic
        async function loadCalls() {
            const res = await fetch('/api/calls');
            const calls = await res.json();
            const filter = document.getElementById('callSearch').value.toLowerCase();
            const list = document.getElementById('calls-list');
            list.innerHTML = '';
            
            calls.forEach(call => {
                if(filter && !call.summary.toLowerCase().includes(filter) && !call.extension.includes(filter)) return;
                list.innerHTML += `
                    <div class="list-group-item">
                        <div class="d-flex w-100 justify-content-between">
                            <h6 class="mb-1">Ext: ${call.extension} | Duration: ${call.duration}s</h6>
                            <small>${call.timestamp}</small>
                        </div>
                        <p class="mb-1 text-muted">${call.summary}</p>
                    </div>`;
            });
        }

        // Missions Logic
        async function loadMissions() {
            const res = await fetch('/api/missions');
            const missions = await res.json();
            const tbody = document.getElementById('missions-table');
            tbody.innerHTML = '';
            
            missions.forEach(m => {
                const isPending = m.status === 'pending';
                const statusBadge = isPending ? 'bg-warning' : (m.status === 'completed' ? 'bg-success' : 'bg-danger');
                
                let contentHTML = isPending 
                    ? `<textarea class="form-control" id="dir-${m.id}">${m.directive}</textarea>`
                    : `<strong>Directive:</strong> ${m.directive}<hr class="my-1"><strong>Log:</strong> <pre class="mb-0" style="font-size:12px;">${m.final_report || 'No report.'}</pre>`;
                    
                let actionHTML = isPending
                    ? `<button class="btn btn-sm btn-primary" onclick="updateMission(${m.id})">Save Setup</button>`
                    : ``;

                tbody.innerHTML += `
                    <tr>
                        <td style="width: 15%">${m.run_at_utc}</td>
                        <td style="width: 10%"><span class="badge ${statusBadge}">${m.status}</span></td>
                        <td style="width: 60%">${contentHTML}</td>
                        <td style="width: 15%">${actionHTML}</td>
                    </tr>`;
            });
        }

        async function updateMission(id) {
            const newDirective = document.getElementById(`dir-${id}`).value;
            await fetch(`/api/missions/${id}`, {
                method: 'PUT',
                body: JSON.stringify({ directive: newDirective })
            });
            loadMissions();
        }

        // Memory Logic
        async function loadMemoryList() {
            const type = document.getElementById('memType').value;
            const res = await fetch(`/api/memory/${type}`);
            const files = await res.json();
            const select = document.getElementById('memFile');
            select.innerHTML = '<option value="">Select a profile...</option>';
            files.forEach(f => select.innerHTML += `<option value="${f}">${f}</option>`);
            document.getElementById('memEditor').value = '';
        }

        async function loadMemoryFile() {
            const type = document.getElementById('memType').value;
            const file = document.getElementById('memFile').value;
            if(!file) return;
            const res = await fetch(`/api/memory/${type}/${file}`);
            const data = await res.json();
            document.getElementById('memEditor').value = data.content;
        }

        async function saveMemory() {
            const type = document.getElementById('memType').value;
            const file = document.getElementById('memFile').value;
            const content = document.getElementById('memEditor').value;
            if(!file) return;
            
            await fetch(`/api/memory/${type}/${file}`, {
                method: 'PUT',
                body: JSON.stringify({ content: content })
            });
            
            const status = document.getElementById('memSaveStatus');
            status.style.display = 'inline';
            setTimeout(() => status.style.display = 'none', 2000);
        }
    </script>
</body>
</html>
